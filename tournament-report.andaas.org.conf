server {
    listen 80;
    listen [::]:80;
    server_name tournament-report.andaas.org;

    root /var/www/tournament-report.andaas.org;
    index index.php;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }
}
